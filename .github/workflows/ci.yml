name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  erlang:
    name: Erlang Tests + Dialyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          rebar3-version: '3.24'

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake libelf-dev

      - name: Cache rebar3
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: rebar3-otp27-${{ runner.os }}-${{ hashFiles('rebar.lock', 'rebar.config') }}
          restore-keys: |
            rebar3-otp27-${{ runner.os }}-

      - name: Cache uBPF
        uses: actions/cache@v4
        with:
          path: third-party/
          key: ubpf-${{ runner.os }}-${{ hashFiles('scripts/build_ubpf.sh') }}

      - name: Build uBPF
        run: ./scripts/build_ubpf.sh

      - name: Compile
        run: rebar3 compile

      - name: EUnit
        run: make test

      - name: Dialyzer
        run: rebar3 dialyzer

  dsl:
    name: Elixir DSL Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.18'

      - name: Compile Erlang (dependency)
        run: rebar3 compile

      - name: Compile DSL
        run: cd dsl && mix deps.get && mix compile

      - name: Test DSL
        run: cd dsl && mix test
