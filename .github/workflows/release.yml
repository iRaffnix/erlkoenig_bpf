name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: x86_64-glibc
            runner: ubuntu-latest
            image: elixir:1.18-otp-27-slim
            deps: apt-get update && apt-get install -y git make gcc g++ curl
          - name: x86_64-musl
            runner: ubuntu-latest
            image: hexpm/elixir:1.18.3-erlang-27.3-alpine-3.21.3
            deps: apk add --no-cache git make gcc g++ musl-dev curl
          - name: aarch64-glibc
            runner: ubuntu-24.04-arm
            image: elixir:1.18-otp-27-slim
            deps: apt-get update && apt-get install -y git make gcc g++ curl

    container:
      image: ${{ matrix.target.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: ${{ matrix.target.deps }}

      - name: Install rebar3
        run: |
          curl -fsSL https://s3.amazonaws.com/rebar3/rebar3 -o /usr/local/bin/rebar3
          chmod +x /usr/local/bin/rebar3

      - name: Verify install
        run: |
          erl -noshell -eval 'io:format("OTP ~s~n", [erlang:system_info(otp_release)]), halt().'
          rebar3 version

      - name: Compile
        run: rebar3 compile

      - name: EUnit
        run: rebar3 eunit

      - name: Collect artifact
        run: |
          mkdir -p out
          tar czf out/erlkoenig_bpf-${{ github.ref_name }}-${{ matrix.target.name }}.tar.gz \
            src/ include/ c_src/ dsl/ examples/ scripts/ \
            rebar.config Makefile LICENSE README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target.name }}
          path: out/*.tar.gz

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz
